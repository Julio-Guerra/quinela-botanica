name: Mise à jour nocturne des résultats

on:
  schedule:
    - cron: "0 21 * * *"   # 23h00 CEST (UTC+2) = 21h00 UTC
  workflow_dispatch:        # bouton « Run workflow » manuel

permissions:
  contents: write           # autorise git push directement sur main

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mise à jour des résultats via Claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Tu es chargé de mettre à jour le fichier `data.js` avec les derniers résultats
            de la Coupe du Monde 2026.

            **Contexte**
            Le fichier `data.js` contient un tableau PARTICIPANTS : chaque participant possède
            3 équipes, chacune avec un champ `stage` indiquant le tour le plus loin atteint.
            Valeurs possibles (ordre croissant) :
              group → r32 → r16 → qf → sf → final → champion

            **Ce que tu dois faire**
            1. Utilise le web search pour trouver les résultats actuels de la FIFA Coupe du
               Monde 2026 (groupe, huitièmes, quarts, demi-finales, finale…).
            2. Pour chaque équipe du fichier `data.js`, détermine le tour le plus loin
               qu'elle a atteint ou atteint jusqu'à présent :
               - Toujours en phase de groupes ou éliminée au groupe → "group"
               - A joué (ou qualifiée pour) les 32es                 → "r32"
               - A joué (ou qualifiée pour) les 16es                 → "r16"
               - A joué (ou qualifiée pour) les quarts               → "qf"
               - A joué (ou qualifiée pour) les demi-finales         → "sf"
               - A joué la finale (perdante)                         → "final"
               - Championne du monde                                 → "champion"
               Si un tour n'a pas encore été joué, ne pas faire avancer l'équipe au-delà
               du tour confirmé.
            3. Met à jour uniquement les champs `stage` qui ont changé dans `data.js`.
            4. Met à jour `LAST_UPDATED` avec l'horodatage ISO 8601 UTC actuel.
            5. Commit et push directement sur la branche main :
               ```
               git config user.name  "github-actions[bot]"
               git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
               git add data.js
               git diff --cached --quiet || git commit -m "🤖 Mise à jour automatique des résultats"
               git push
               ```
               Si aucun champ n'a changé, affiche un message et ne fais aucun commit.

            **Règles importantes**
            - Ne modifie jamais le barème SCORING, le BONUS, les noms des participants,
              ni les noms des équipes — seulement les `stage` et `LAST_UPDATED`.
            - Ne recule jamais un `stage` : si une équipe est déjà à "qf", ne la remets
              pas à "r16" même si c'est une erreur dans le fichier.
            - En cas de doute sur le résultat d'un match, conserve la valeur actuelle.
