name: Mise à jour nocturne des résultats

on:
  schedule:
    - cron: "0 3 * * *"      # tous les jours à 03:00 UTC
  workflow_dispatch:          # + bouton « Run workflow » manuel

permissions:
  contents: write             # autorise le push du data.js mis à jour

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Mettre à jour data.js
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update-results.mjs

      - name: Commit & push si modifié
        run: |
          if [[ -n "$(git status --porcelain data.js)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.js
            git commit -m "🤖 Mise à jour automatique des résultats"
            git push
          else
            echo "Aucun changement — rien à pousser."
          fi
