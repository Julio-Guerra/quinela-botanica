<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiñela — Coupe du Monde 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">

    <header class="header">
      <div class="trophy">🏆</div>
      <h1 class="title">QUIÑELA</h1>
      <p class="subtitle">COUPE DU MONDE 2026</p>
      <p class="tagline">Tirez · Assignez · Encouragez · Gagnez — que la meilleure équipe gagne !</p>
    </header>

    <div class="statusbar">
      <span id="status">🏆 Classement général</span>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Participant</th>
            <th>Équipes attribuées</th>
            <th>Pts</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <p class="foot" id="updated"></p>

  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
